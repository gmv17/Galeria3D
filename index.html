<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavilhão Autoral 3D</title>
  <meta name="description" content="Experiência imersiva 3D em galeria autoral." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f0d12;
      --text:#f6f3ef;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    html{scroll-behavior:auto;}
    body{overflow-x:hidden; overscroll-behavior-y:none;}
    canvas{display:block;position:fixed;inset:0;width:100vw;height:100vh}

    #smooth-wrapper{position:relative; width:100%; min-height:100vh; overflow:hidden;}
    #smooth-content{position:relative; min-height:100vh;}

    .scroll-track{
      position:relative;
      height:2200vh;
      z-index:1;
      pointer-events:none;
    }

    .ui-layer{
      position:fixed;
      inset:0;
      z-index:5;
      pointer-events:none;
    }

    .section-indicator{
      position:absolute;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      gap:10px;
      padding:0;
      color:rgba(246,243,239,.88);
      font-size:.72rem;
      letter-spacing:.16em;
      text-transform:uppercase;
      opacity:.92;
    }

    .section-indicator::before{
      content:"";
      width:26px;
      height:1px;
      background:rgba(246,243,239,.45);
      display:block;
    }

    .section-indicator::after{
      content:"";
      width:26px;
      height:1px;
      background:rgba(246,243,239,.18);
      display:block;
    }

    @media (max-width: 820px){
      .section-indicator{
        bottom:14px;
        font-size:.66rem;
        letter-spacing:.14em;
      }

      .section-indicator::before,
      .section-indicator::after{
        width:18px;
      }
    }

    @media (max-width: 820px){
      .scroll-track{height:700vh}
    }
  

/* BOTAO RETURN LINHA FINA */

.btn-return{
  position: fixed;
  left: 18px;
  bottom: 18px;
  width: 66px;
  height: 66px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.55);
  background: rgba(120,140,180,0.12);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 1.4px;
  color: rgba(0,0,0,0.9);
  cursor: pointer;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  box-shadow:
    0 6px 18px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.25),
    inset 0 -2px 6px rgba(0,0,0,0.15);
  transform: translateZ(0);
  transition:
    transform .22s cubic-bezier(.22,.61,.36,1),
    box-shadow .22s cubic-bezier(.22,.61,.36,1),
    background .22s ease,
    opacity .45s ease;
}
.btn-return::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.18);
}
.btn-return:hover{
  transform: translateY(-3px);
  box-shadow:
    0 10px 24px rgba(0,0,0,0.22),
    inset 0 1px 0 rgba(255,255,255,0.25),
    inset 0 -2px 6px rgba(0,0,0,0.15);
}
.btn-return:active{
  transform: translateY(2px) scale(0.96);
  box-shadow:
    inset 0 4px 10px rgba(0,0,0,0.25),
    inset 0 -1px 2px rgba(255,255,255,0.2);
}

.hero-words{
  position:absolute;
  left:clamp(22px, 5vw, 72px);
  top:13.5vh;
  z-index:8;
  width:min(34vw, 300px);
  pointer-events:none;
}

.hero-word{
  font-family:"Cormorant Garamond", "Times New Roman", serif;
  font-size:clamp(4.35rem, 8.5vw, 9.25rem);
  line-height:.88;
  letter-spacing:.09em;
  font-weight:400;
  text-transform:none;
  color:rgba(246,243,239,.97);
  opacity:0;
  transform:translate3d(0,-18vh,0);
  filter:blur(10px);
  will-change:transform,opacity,filter;
  text-shadow:0 10px 38px rgba(0,0,0,.18);
  position:relative;
  display:block;
  width:max-content;
  padding-bottom:.12em;
  --underline-reveal:0;
}

.hero-word::after{
  content:"";
  position:absolute;
  left:.01em;
  bottom:-.05em;
  width:100%;
  height:1px;
  background:rgba(246,243,239,.94);
  transform:scaleX(var(--underline-reveal));
  transform-origin:left center;
  transition:transform .22s ease-out;
  box-shadow:0 0 12px rgba(246,243,239,.16);
}

.hero-word + .hero-word{
  margin-top:.38em;
}

@media (max-width: 820px){
  .hero-words{
    left:6vw;
    top:48%;
    gap:.14em;
  }

  .hero-word{
    font-family:"Cormorant Garamond", "Times New Roman", serif;
    font-size:clamp(3rem, 13vw, 5.8rem);
    letter-spacing:.09em;
    font-weight:400;
    line-height:.9;
  }
}

</style>
</head>
<body>
<div id="smooth-wrapper">
    <div id="smooth-content">

  <div class="ui-layer">
    <div class="section-indicator" id="sectionChip">Exterior</div>
    <div class="hero-words" id="heroWords" aria-hidden="true">
      <span class="hero-word">Entrar</span>
      <span class="hero-word">Olhar</span>
      <span class="hero-word">Sentir</span>
    </div>
  </div>

  <div class="scroll-track"></div>

    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollSmoother.min.js"></script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const hasScrollSmoother = typeof window.ScrollSmoother !== 'undefined';
    gsap.registerPlugin(ScrollTrigger);
    if (hasScrollSmoother) gsap.registerPlugin(ScrollSmoother);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x4f566f);
    scene.fog = new THREE.Fog(0x4f566f, 20, 96);

    const isMobile = window.matchMedia('(max-width: 820px)').matches;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 140);
    camera.position.set(-3.2, 3.0, 41);

    const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, window.innerWidth <= 820 ? 1.15 : 1.35));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.prepend(renderer.domElement);

    /* ========= HELPERS ========= */
    const lookTarget = new THREE.Vector3(0, 2, 0);
    const clock = new THREE.Clock();
    const sectionChip = document.getElementById('sectionChip');
    const heroWords = Array.from(document.querySelectorAll('.hero-word'));

    const smoothWrapper = document.getElementById('smooth-wrapper');
    const smoothContent = document.getElementById('smooth-content');
    let smoother = null;

    let pageLoaded = false;
    let modelLoaded = false;
    let experienceStarted = false;

    function setSection(name){
      sectionChip.textContent = name;
    }

    function initSmoother(){
      if (smoother || prefersReducedMotion || isMobile || !smoothWrapper || !smoothContent || !hasScrollSmoother) return;

      smoother = ScrollSmoother.create({
        wrapper: smoothWrapper,
        content: smoothContent,
        smooth: 1.08,
        smoothTouch: 0.08,
        normalizeScroll: true,
        effects: false,
        ignoreMobileResize: true
      });
    }

    /* ========= LIGHT ========= */
    const ambient = new THREE.AmbientLight(0xbec3d8, 0.36);
    scene.add(ambient);

    const hemi = new THREE.HemisphereLight(0x756d8f, 0x23252d, 0.48);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffbc8c, 0.54);
    sun.position.set(-10, 8, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 1536;
    sun.shadow.mapSize.height = 1536;
    sun.shadow.camera.left = -18;
    sun.shadow.camera.right = 18;
    sun.shadow.camera.top = 18;
    sun.shadow.camera.bottom = -18;
    scene.add(sun);

    const skyDome = new THREE.Mesh(
      new THREE.SphereGeometry(74, 64, 64),
      new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        uniforms: {
          topColor: { value: new THREE.Color(0x5f6788) },
          midColor: { value: new THREE.Color(0x7a6474) },
          horizonColor: { value: new THREE.Color(0x2c2f3d) },
          bottomColor: { value: new THREE.Color(0x14161d) }
        },
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * viewMatrix * worldPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vWorldPosition;
          uniform vec3 topColor;
          uniform vec3 midColor;
          uniform vec3 horizonColor;
          uniform vec3 bottomColor;

          void main() {
            float h = normalize(vWorldPosition).y * 0.5 + 0.5;
            vec3 colorA = mix(bottomColor, horizonColor, smoothstep(0.00, 0.28, h));
            vec3 colorB = mix(horizonColor, midColor, smoothstep(0.22, 0.58, h));
            vec3 colorC = mix(midColor, topColor, smoothstep(0.55, 1.00, h));
            vec3 finalColor = mix(colorA, colorB, smoothstep(0.12, 0.60, h));
            finalColor = mix(finalColor, colorC, smoothstep(0.52, 1.00, h));
            gl_FragColor = vec4(finalColor, 1.0);
          }
        `
      })
    );
    skyDome.position.set(0, 10, -10);
    scene.add(skyDome);

    const horizonCurtain = new THREE.Mesh(
      new THREE.CylinderGeometry(58, 58, 26, 64, 1, true),
      new THREE.ShaderMaterial({
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
        uniforms: {
          topFade: { value: new THREE.Color(0x000000) },
          bottomFade: { value: new THREE.Color(0x0f1117) }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform vec3 topFade;
          uniform vec3 bottomFade;
          void main() {
            float vertical = smoothstep(0.26, 0.98, 1.0 - vUv.y);
            float alpha = smoothstep(0.38, 0.98, vertical) * 0.34;
            vec3 color = mix(topFade, bottomFade, smoothstep(0.12, 0.92, vUv.y));
            gl_FragColor = vec4(color, alpha);
          }
        `
      })
    );
    horizonCurtain.position.set(0, 7.8, -14);
    scene.add(horizonCurtain);
    horizonCurtain.visible = false;

    const horizonFloorFade = new THREE.Mesh(
      new THREE.CircleGeometry(44, 64),
      new THREE.MeshBasicMaterial({
        color: 0x0b0d12,
        transparent: true,
        opacity: 0.1,
        depthWrite: false
      })
    );
    horizonFloorFade.rotation.x = -Math.PI / 2;
    horizonFloorFade.position.set(0, 0.03, -16);
    scene.add(horizonFloorFade);
    horizonFloorFade.visible = false;

    /* ========= MATERIALS ========= */
    function hexToRgb(hex){
      const n = parseInt(hex.replace('#',''), 16);
      return { r:(n >> 16) & 255, g:(n >> 8) & 255, b:n & 255 };
    }

    function buildConcreteTexture({
      base = '#b7b7b3',
      width = 512,
      height = 512,
      verticalPanels = false,
      panelCount = 4
    } = {}){
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const c = canvas.getContext('2d');

      const baseRgb = hexToRgb(base);
      const img = c.createImageData(width, height);

      for(let i = 0; i < img.data.length; i += 4){
        const grain = (Math.random() - 0.5) * 26;
        const cloud = Math.sin((i / 4 % width) * 0.035) * 4 + Math.cos(Math.floor(i / 4 / width) * 0.028) * 4;
        img.data[i] = Math.max(0, Math.min(255, baseRgb.r + grain + cloud));
        img.data[i + 1] = Math.max(0, Math.min(255, baseRgb.g + grain + cloud));
        img.data[i + 2] = Math.max(0, Math.min(255, baseRgb.b + grain + cloud));
        img.data[i + 3] = 255;
      }

      c.putImageData(img, 0, 0);

      for(let i = 0; i < 1700; i++){
        const alpha = Math.random() * 0.08;
        c.fillStyle = Math.random() > 0.5
          ? `rgba(255,255,255,${alpha})`
          : `rgba(60,60,60,${alpha})`;
        const x = Math.random() * width;
        const y = Math.random() * height;
        const w = Math.random() * 3 + 0.6;
        const h = Math.random() * 3 + 0.6;
        c.fillRect(x, y, w, h);
      }

      for(let i = 0; i < 34; i++){
        c.strokeStyle = `rgba(255,255,255,${Math.random() * 0.035})`;
        c.lineWidth = Math.random() * 1.4 + 0.4;
        c.beginPath();
        const sx = Math.random() * width;
        const sy = Math.random() * height;
        c.moveTo(sx, sy);
        c.bezierCurveTo(
          sx + (Math.random() * 120 - 60),
          sy + (Math.random() * 60 - 30),
          sx + (Math.random() * 120 - 60),
          sy + (Math.random() * 60 - 30),
          sx + (Math.random() * 170 - 85),
          sy + (Math.random() * 90 - 45)
        );
        c.stroke();
      }

      if(verticalPanels){
        const gap = width / panelCount;
        for(let i = 1; i < panelCount; i++){
          const x = Math.round(i * gap);
          c.fillStyle = 'rgba(255,255,255,0.08)';
          c.fillRect(x - 1, 0, 1, height);
          c.fillStyle = 'rgba(40,40,40,0.18)';
          c.fillRect(x, 0, 2, height);
        }
      }

      return canvas;
    }

    function buildGraffitiTexture(width = 1024, height = 1024){
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const c = canvas.getContext('2d');

      const concrete = buildConcreteTexture({
        base:'#b8b7b2',
        width,
        height,
        verticalPanels:true,
        panelCount:6
      });
      c.drawImage(concrete, 0, 0, width, height);

      function sprayBlob(color, alpha, scaleX = 1, scaleY = 1){
        c.save();
        c.globalAlpha = alpha;
        c.fillStyle = color;

        for(let i = 0; i < 6; i++){
          const x = Math.random() * width;
          const y = Math.random() * height;
          const radius = 90 + Math.random() * 180;

          c.beginPath();
          for(let j = 0; j < 7; j++){
            const angle = (Math.PI * 2 * j) / 7;
            const rx = radius * (0.7 + Math.random() * 0.9) * scaleX;
            const ry = radius * (0.55 + Math.random() * 0.85) * scaleY;
            const px = x + Math.cos(angle) * rx;
            const py = y + Math.sin(angle) * ry;
            if(j === 0) c.moveTo(px, py);
            else c.lineTo(px, py);
          }
          c.closePath();
          c.fill();
        }
        c.restore();
      }

      function paintRibbon(color, alpha, lineWidth){
        c.save();
        c.globalAlpha = alpha;
        c.strokeStyle = color;
        c.lineCap = 'round';
        c.lineJoin = 'round';
        c.lineWidth = lineWidth;

        for(let i = 0; i < 9; i++){
          const startX = Math.random() * width;
          const startY = Math.random() * height;
          c.beginPath();
          c.moveTo(startX, startY);
          c.bezierCurveTo(
            Math.random() * width, Math.random() * height,
            Math.random() * width, Math.random() * height,
            Math.random() * width, Math.random() * height
          );
          c.stroke();
        }
        c.restore();
      }

      sprayBlob('#5b19c8', 0.28, 1.25, 0.82);
      sprayBlob('#e6bf3d', 0.24, 1.12, 0.74);
      sprayBlob('#1d86a8', 0.22, 0.94, 1.14);
      sprayBlob('#f36b4f', 0.18, 0.9, 0.9);

      paintRibbon('rgba(255,255,255,0.78)', 0.2, 12);
      paintRibbon('rgba(32,26,48,0.92)', 0.18, 8);
      paintRibbon('rgba(255,208,77,0.96)', 0.17, 6);

      c.save();
      for(let i = 0; i < 950; i++){
        const x = Math.random() * width;
        const y = Math.random() * height;
        const r = Math.random() * 2.4 + 0.4;
        c.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.11)' : 'rgba(0,0,0,0.05)';
        c.beginPath();
        c.arc(x, y, r, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();

      return canvas;
    }

    function buildPaverTexture(width = 1024, height = 1024){
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const c = canvas.getContext('2d');

      c.fillStyle = '#b9b9b5';
      c.fillRect(0, 0, width, height);

      const cols = 12;
      const rows = 12;
      const tileW = width / cols;
      const tileH = height / rows;

      for(let row = 0; row < rows; row++){
        for(let col = 0; col < cols; col++){
          const x = col * tileW;
          const y = row * tileH;
          const offset = row % 2 === 0 ? 0 : tileW * 0.5;
          const px = (x + offset) % width;
          const jitter = (Math.random() - 0.5) * 10;
          const shade = 176 + jitter;

          c.fillStyle = `rgb(${shade}, ${shade}, ${shade - 4})`;
          c.fillRect(px + 2, y + 2, tileW - 4, tileH - 4);

          c.strokeStyle = 'rgba(70,70,70,0.22)';
          c.lineWidth = 2;
          c.strokeRect(px + 2, y + 2, tileW - 4, tileH - 4);
        }
      }

      c.save();
      c.globalAlpha = 0.16;
      for(let i = 0; i < 2600; i++){
        const x = Math.random() * width;
        const y = Math.random() * height;
        const s = Math.random() * 2 + 0.4;
        c.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.18)';
        c.fillRect(x, y, s, s);
      }
      c.restore();

      return canvas;
    }

    const wallTexture = new THREE.CanvasTexture(buildConcreteTexture({
      base:'#c7b8a8',
      verticalPanels:true,
      panelCount:6
    }));
    wallTexture.wrapS = wallTexture.wrapT = THREE.RepeatWrapping;
    wallTexture.repeat.set(3.2, 2.4);

    const hallGraffitiTexture = new THREE.CanvasTexture(buildGraffitiTexture());
    hallGraffitiTexture.wrapS = hallGraffitiTexture.wrapT = THREE.RepeatWrapping;
    hallGraffitiTexture.repeat.set(1.2, 1);

    const paverTexture = new THREE.CanvasTexture(buildPaverTexture());
    paverTexture.wrapS = paverTexture.wrapT = THREE.RepeatWrapping;
    paverTexture.repeat.set(2.8, 2.8);

    const floorTexture = new THREE.CanvasTexture(buildConcreteTexture({
      base:'#a9a8a3'
    }));
    floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(4.2, 10.5);

    const ceilingTexture = new THREE.CanvasTexture(buildConcreteTexture({
      base:'#6b6b68'
    }));
    ceilingTexture.wrapS = ceilingTexture.wrapT = THREE.RepeatWrapping;
    ceilingTexture.repeat.set(4.4, 10.5);

    const exteriorGroundMat = new THREE.MeshStandardMaterial({ color: 0x6a605c, roughness: 0.99, metalness: 0.01 });
    const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0xd9ccbb, roughness: 0.96, metalness: 0.01 });
    const plazaPaverMat = new THREE.MeshStandardMaterial({ color: 0xb9b9b5, roughness: 0.98, metalness: 0.01, map: paverTexture });
    const planterStoneMat = new THREE.MeshStandardMaterial({ color: 0xa4a19b, roughness: 0.94, metalness: 0.02 });
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x7f9c6b, roughness: 0.98, metalness: 0.0 });
    const woodBenchMat = new THREE.MeshStandardMaterial({ color: 0x7a5635, roughness: 0.82, metalness: 0.04 });
    const benchMetalMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.74, metalness: 0.22 });
    const treeLeafMat = new THREE.MeshStandardMaterial({ color: 0xc2d69b, roughness: 0.95, metalness: 0.0 });
    const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x7a6248, roughness: 0.96, metalness: 0.0 });
    const buildingMat = new THREE.MeshStandardMaterial({ color: 0xd5ccbf, roughness: 0.92, metalness: 0.02 });
    const darkConcreteMat = new THREE.MeshStandardMaterial({ color: 0x8f8578, roughness: 0.94, metalness: 0.01 });
    const galleryUnifiedWallMat = new THREE.MeshStandardMaterial({
      color: 0xa89a8c,
      roughness: 0.96,
      metalness: 0.01,
      map: wallTexture,
      emissive: 0x1c1713,
      emissiveIntensity: 0.18
    });
    galleryUnifiedWallMat.envMapIntensity = 0.2;
    const hallWallMat = new THREE.MeshStandardMaterial({ color: 0xd3d0ca, roughness: 0.84, metalness: 0.02, map: hallGraffitiTexture });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xa9a8a3, roughness: 0.98, metalness: 0.01, map: floorTexture });
    const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x6b6b68, roughness: 0.97, metalness: 0.01, map: ceilingTexture });
    const plinthMat = new THREE.MeshStandardMaterial({ color: 0xcabfac, roughness: 0.9 });

    /* ========= EXTERIOR ========= */
    const exteriorGroup = new THREE.Group();
    scene.add(exteriorGroup);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), exteriorGroundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    exteriorGroup.add(ground);

      const boxBefore = new THREE.Box3().setFromObject(model);
      const sizeBefore = boxBefore.getSize(new THREE.Vector3());
      const currentHeight = Math.max(sizeBefore.y, 0.001);
      const uniformScale = targetHeight / currentHeight;

      model.scale.setScalar(uniformScale);
      model.rotation.set(0, Math.PI, 0);

      const boxAfter = new THREE.Box3().setFromObject(model);
      const centerAfter = boxAfter.getCenter(new THREE.Vector3());
      const minAfter = boxAfter.min.clone();

      model.position.set(-centerAfter.x, -minAfter.y, -centerAfter.z);

      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.needsUpdate = true;
          }
        }
      });

      sculpture.add(model);
      modelLoaded = true;
      initExperience();
    }, undefined, (error) => {

        map: tex,

      const front = new THREE.Mesh(new THREE.PlaneGeometry(w, h), frontMat);
      front.position.y = h * 0.5;

    function buildArtTexture(base, accent, title){
      const c = document.createElement('canvas');
      c.width = 1024; c.height = 768;
      const cx = c.getContext('2d');

      const grad = cx.createLinearGradient(0,0,c.width,c.height);
      grad.addColorStop(0, base);
      grad.addColorStop(1, '#f3eee6');
      cx.fillStyle = grad;
      cx.fillRect(0,0,c.width,c.height);

      cx.globalAlpha = .18;
      for(let i=0;i<8;i++){
        cx.fillStyle = i % 2 === 0 ? accent : '#ffffff';
        cx.beginPath();
        cx.arc(Math.random()*c.width, Math.random()*c.height, Math.random()*120 + 40, 0, Math.PI*2);
        cx.fill();
      }

      cx.globalAlpha = .9;
      cx.fillStyle = accent;
      cx.fillRect(70, 70, 18, c.height - 140);
      cx.fillRect(120, 110, c.width * 0.5, 18);
      cx.fillRect(120, 165, c.width * 0.34, 10);

      cx.globalAlpha = .82;
      cx.fillStyle = '#111';
      cx.font = '700 72px Arial';
      const shortTitle = title.length > 18 ? title.slice(0,18) : title;
      cx.fillText(shortTitle, 120, c.height - 120);

      cx.globalAlpha = .45;
      cx.strokeStyle = accent;
      cx.lineWidth = 7;
      cx.strokeRect(c.width - 280, 82, 170, 170);

      return new THREE.CanvasTexture(c);
    }

    function createFrame(def){
      const group = new THREE.Group();

      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(def.size[0] + 0.22, def.size[1] + 0.22, 0.12),
        new THREE.MeshStandardMaterial({ color: 0xf4efe7, roughness: 0.48, metalness: 0.06 })
      );

      const art = new THREE.Mesh(
        new THREE.PlaneGeometry(def.size[0], def.size[1]),
        new THREE.MeshStandardMaterial({
          map: buildArtTexture(def.base, def.accent, def.title),
          roughness: 0.82,
          metalness: 0.01
        })
      );
      art.position.z = 0.066;

      group.add(frame, art);
      group.position.set(...def.pos);
      group.rotation.y = def.rotY;

      group.userData = {
        art,
        def,
        clickOffset: 0
      };

      artworks.push(group);
      interior.add(group);

      const spot = new THREE.SpotLight(0xffffff, 4.2, 11.5, Math.PI/7.2, 0.86, 1.55);
      if(Math.abs(def.rotY) < 0.1){
        spot.position.set(def.pos[0], 4.82, def.pos[2] + 3.55);
        spot.target = group;
      }else if(def.rotY > 0){
        spot.position.set(def.pos[0] + 1.7, 4.82, def.pos[2]);
        spot.target = group;
      }else{
        spot.position.set(def.pos[0] - 1.7, 4.82, def.pos[2]);
        spot.target = group;
      }
      scene.add(spot);
      scene.add(spot.target);
    }

    artworkDefs.forEach(createFrame);

    /* ========= INTERACTION ========= */
    window.addEventListener('mousemove', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener('mouseleave', () => {
      mouse.x = 9999; mouse.y = 9999;
      hoveredArtwork = null;
      document.body.style.cursor = 'default';
    });

    window.addEventListener('click', () => {
      if (!hoveredArtwork) return;

      artworks.forEach((item) => {
        if (!item.userData.clickOffset) item.userData.clickOffset = 0;
        gsap.to(item.userData, {
          clickOffset: 0,
          duration: 0.45,
          ease: 'power2.out'
        });
      });

      gsap.to(hoveredArtwork.userData, {
        clickOffset: 0.16,
        duration: 0.42,
        ease: 'power2.out',
        yoyo: true,
        repeat: 1
      });
    });

    function clamp01(v){
      return Math.max(0, Math.min(1, v));
    }

    function easeInOutCubic(t){
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function mapRange(value, inMin, inMax, outMin, outMax){
      const p = clamp01((value - inMin) / (inMax - inMin));
      return outMin + (outMax - outMin) * p;
    }

    function animateHeroWords(heroProgress){
      const ranges = [
        { enterStart: 0.00, enterEnd: 0.22, exitStart: 0.28, exitEnd: 0.52 },
        { enterStart: 0.08, enterEnd: 0.30, exitStart: 0.34, exitEnd: 0.58 },
        { enterStart: 0.16, enterEnd: 0.38, exitStart: 0.40, exitEnd: 0.64 }
      ];

      heroWords.forEach((el, index) => {
        const def = ranges[index];
        let y = -140;
        let x = 0;
        let opacity = 0;
        let blur = 16;
        let letter = 0.12;

        if (heroProgress >= def.enterStart){
          const enterP = easeInOutCubic(clamp01((heroProgress - def.enterStart) / (def.enterEnd - def.enterStart)));
          y = mapRange(enterP, 0, 1, -140, 0);
          opacity = mapRange(enterP, 0, 1, 0, 1);
          blur = mapRange(enterP, 0, 1, 16, 0);
          letter = mapRange(enterP, 0, 1, 0.12, 0.06);
        }

        if (heroProgress >= def.exitStart){
          const exitP = easeInOutCubic(clamp01((heroProgress - def.exitStart) / (def.exitEnd - def.exitStart)));
          x = mapRange(exitP, 0, 1, 0, -190);
          opacity = mapRange(exitP, 0, 1, opacity, 0);
          blur = mapRange(exitP, 0, 1, blur, 10);
          letter = mapRange(exitP, 0, 1, letter, -0.01);
        }

        el.style.opacity = opacity.toFixed(3);
        el.style.filter = `blur(${blur.toFixed(2)}px)`;
        el.style.letterSpacing = `${letter.toFixed(3)}em`;
        el.style.transform = `translate3d(${x.toFixed(1)}px, ${y.toFixed(1)}px, 0)`;
        el.style.setProperty('--underline-reveal', Math.max(0, Math.min(1, opacity)).toFixed(3));
      });
    }

    function setupHeroWordScroll(){
      heroWords.forEach((word, index) => {
        const startProgress = 0.014 + index * 0.026;
        const endProgress = 0.072 + index * 0.036;

        ScrollTrigger.create({
          trigger: '.scroll-track',
          start: 'top top',
          end: 'bottom bottom',
          scrub: 0.82,
          onUpdate: (self) => {
            const p = self.progress;
            let local = (p - startProgress) / (endProgress - startProgress);
            local = Math.max(0, Math.min(1, local));

            const easedBase = local < 0.5
              ? 4 * local * local * local
              : 1 - Math.pow(-2 * local + 2, 3) / 2;
            const eased = Math.pow(easedBase, 1.28);

            const x = -290 * eased;
            const y = -18 * eased;
            const opacity = 1 - Math.min(1, eased * 1.18);
            const blur = 18 * eased;
            const letter = -0.02 - eased * 0.062;

            word.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            word.style.opacity = opacity.toFixed(3);
            word.style.filter = `blur(${blur.toFixed(2)}px)`;
            word.style.letterSpacing = `${letter.toFixed(3)}em`;
            word.style.setProperty('--underline-reveal', Math.max(0, opacity).toFixed(3));
          }
        });
      });
    }

    function runHeroIntro(){
      gsap.set(heroWords, {
        opacity: 0,
        yPercent: 0,
        y: -window.innerHeight * 0.18,
        x: 0,
        filter: 'blur(10px)'
      });
      heroWords.forEach((word) => word.style.setProperty('--underline-reveal', '0'));

      const heroIntro = gsap.timeline({
        onComplete: () => {
          setupHeroWordScroll();
          ScrollTrigger.refresh();
        }
      });

      [2, 1, 0].forEach((wordIndex, i) => {
        const word = heroWords[wordIndex];

        heroIntro.to(word, {
          opacity: 1,
          y: 0,
          x: 0,
          filter: 'blur(0px)',
          duration: 0.82,
          ease: 'power3.out',
          onStart: () => word.style.setProperty('--underline-reveal', '0'),
          onUpdate: function(){
            word.style.setProperty('--underline-reveal', this.progress().toFixed(3));
          },
          onComplete: () => word.style.setProperty('--underline-reveal', '1')
        }, i === 0 ? 0.08 : '+=0.08');

        heroIntro.to(word, {
          y: -8,
          duration: 0.12,
          ease: 'power1.out'
        });

        heroIntro.to(word, {
          y: 0,
          duration: 0.18,
          ease: 'power2.out'
        });
      });
    }

    function initExperience(){
      if (experienceStarted || !modelLoaded) return;
      experienceStarted = true;
      document.body.classList.remove('loading');
      try {
        initSmoother();
      } catch (error) {
        console.error('Falha ao iniciar ScrollSmoother:', error);
      }
      runHeroIntro();
    }

    window.addEventListener('load', initExperience, { once:true });
    window.addEventListener('DOMContentLoaded', () => {
      window.setTimeout(initExperience, 80);
    }, { once:true });

    /* ========= AMBIENT MOTION ========= */
    let scrollVelocity = 0;
    let bobStrength = 0;
    let bobOffset = 0;

    const CAMERA_SMOOTH_POSITION = 0.11;
    const CAMERA_SMOOTH_LOOK = 0.12;

    function smoothstep(edge0, edge1, x){
      const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
      return t * t * (3 - 2 * t);
    }

    const currentCameraPos = camera.position.clone();
    const currentLookTarget = lookTarget.clone();
    currentLookTarget.set(pathState.lookX, pathState.lookY, pathState.lookZ);
    const tempVec3 = new THREE.Vector3();
    const baseLookTarget = new THREE.Vector3();
    const statueLookTarget = new THREE.Vector3();
    const exitLookTarget = new THREE.Vector3();
    const blendedLookTarget = new THREE.Vector3();

    function animate(){
      const t = clock.getElapsedTime();

      trees.forEach((tree, i) => {
        tree.rotation.z = Math.sin(t * 0.55 + i * 0.7) * 0.012;
        tree.rotation.x = Math.cos(t * 0.48 + i * 0.5) * 0.006;
      });

      const hallZone = 1 - smoothstep(2, 14, Math.abs(pathState.camZ + 6));
      const galleryZone = 1 - smoothstep(8, 30, Math.abs(pathState.camZ + 24));
      const exteriorApproachZone = smoothstep(12, 38, pathState.camZ) * (1 - smoothstep(12, 22, Math.abs(pathState.lookZ - 18.8)));
      const localSoftness = Math.max(hallZone * 0.5, galleryZone * 0.45);
      const positionSmooth = CAMERA_SMOOTH_POSITION + localSoftness * 0.02 + exteriorApproachZone * 0.05;
      const lookSmooth = CAMERA_SMOOTH_LOOK + localSoftness * 0.018 + exteriorApproachZone * 0.03;
      const sculptureSpin = 0.0012;

      sculpture.rotation.y += sculptureSpin;
      bobStrength += (0 - bobStrength) * 0.09;
      scrollVelocity *= 0.82;
      bobOffset = Math.sin(t * 4.4) * bobStrength * 0.09 * (1 - localSoftness * 0.35);

      tempVec3.set(
        pathState.camX,
        pathState.camY + bobOffset,
        pathState.camZ
      );
      currentCameraPos.lerp(tempVec3, positionSmooth);
      camera.position.copy(currentCameraPos);

      blendedLookTarget.set(
        pathState.lookX,
        pathState.lookY + bobOffset * 0.12,
        pathState.lookZ
      );

      currentLookTarget.lerp(blendedLookTarget, lookSmooth);
      camera.lookAt(currentLookTarget);
      
      scene.fog.far = pathState.fogFar;

      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(artworks.map(a => a.userData.art), false);

      artworks.forEach((item) => {
        item.scale.lerp(new THREE.Vector3(1,1,1), 0.06);
        item.userData.art.material.emissive.setHex(0x000000);

        const def = item.userData.def;
        const offset = item.userData.clickOffset || 0;
        let px = def.pos[0];
        let py = def.pos[1];
        let pz = def.pos[2];

        if (Math.abs(def.rotY) < 0.1) {
          pz += offset;
        } else if (def.rotY > 0) {
          px += offset;
        } else {
          px -= offset;
        }

        item.position.lerp(new THREE.Vector3(px, py, pz), 0.12);
      });

      if (hit.length > 0) {
        const mesh = hit[0].object;
        const parent = artworks.find(a => a.userData.art === mesh);
        hoveredArtwork = parent || null;
        if (parent) {
          parent.scale.lerp(new THREE.Vector3(1.03,1.03,1.03), 0.1);
          parent.userData.art.material.emissive.setHex(0x020202);
        }
      } else {
        hoveredArtwork = null;
      }

      document.body.style.cursor = hoveredArtwork ? 'pointer' : 'default';

      renderer.render(scene, camera);
    }

    gsap.ticker.add(animate);

    ScrollTrigger.create({
      trigger: '.scroll-track',
      start: 'top top',
      end: 'bottom bottom',
      scrub: 1.15,
      onUpdate: (self) => {
        scrollVelocity = self.getVelocity();
      }
    });

    
    /* ========= BOTAO RETURN HTML / FINAL ========= */
    const returnButton = document.querySelector('.btn-return');
    if (returnButton) {
      gsap.set(returnButton, { opacity: 0, pointerEvents: 'none' });

      ScrollTrigger.create({
        trigger: '.scroll-track',
        start: '92% bottom',
        end: 'bottom bottom',
        onEnter: () => {
          gsap.to(returnButton, {
            opacity: 1,
            duration: 0.45,
            ease: 'power2.out',
            onStart: () => { returnButton.style.pointerEvents = 'auto'; }
          });
        },
        onEnterBack: () => {
          gsap.to(returnButton, {
            opacity: 1,
            duration: 0.25,
            ease: 'power2.out',
            onStart: () => { returnButton.style.pointerEvents = 'auto'; }
          });
        },
        onLeaveBack: () => {
          gsap.to(returnButton, {
            opacity: 0,
            duration: 0.25,
            ease: 'power2.out',
            onComplete: () => { returnButton.style.pointerEvents = 'none'; }
          });
        }
      });
    }

    /* ========= RESIZE ========= */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, window.innerWidth <= 820 ? 1.15 : 1.35));
    });
